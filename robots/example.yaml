robot:
  name: "Example Robot"
  body:
    shape: circle
    radius: 0.11
    mass: 1.0
    max_speed: 1.5

  wheels:
    type: omnidirectional
    count: 4
    positions: [45, 135, 225, 315]

  sensors:
    ir_ring:
      count: 16
      range: 1.5
      noise_std: 0.03

    compass:
      noise_std: 2.0

    ultrasound:
      count: 4
      directions: [0, 90, 180, 270]
      range: 2.0
      noise_std: 0.03

    # Câmera simulada (liga Vision) — frame RGB via hal.read_camera_frame()
    # catadioptric = espelho 360° (Aperture); também: pinhole | fisheye
    camera:
      type: catadioptric
      width: 120
      height: 90
      height_m: 0.25
      range: 2.5
      noise_std: 4.0

    # Velocidade absoluta da bola (m/s, frame do mundo) — p/ interceptação
    ball_velocity:
      noise_std: 0.05

    # Feixe de ToF que detecta só robôs (estilo Leopard: 5 sensores a 20°)
    opponent_lidar:
      directions: [-40, -20, 0, 20, 40]
      range: 1.0
      noise_std: 0.02

    line_sensors:
      count: 4
      positions:
        - [0.09, 0.0]
        - [-0.09, 0.0]
        - [0.0, 0.09]
        - [0.0, -0.09]

  kicker:
    force: 5.0
    cooldown: 2.0

  # Malha 3D do viewer (opcional, só cosmética — a física usa body.shape).
  # Exporte o CAD como .glb EM METROS para robots/meshes/.
  visual:
    mesh: demo.glb
    scale: 1.0
    offset: [0, 0, 0]      # metros, eixos Three.js (x=campo, y=altura, z)
    rotation: [0, 0, 0]    # graus — corrige orientação do CAD
