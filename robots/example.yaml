robot:
  name: "Example Robot"
  body:
    shape: circle
    radius: 0.11
    mass: 1.0
    max_speed: 1.5

  wheels:
    type: omnidirectional
    count: 4
    positions: [45, 135, 225, 315]

  sensors:
    ir_ring:
      count: 16
      range: 1.5
      noise_std: 0.03

    compass:
      noise_std: 2.0

    ultrasound:
      count: 4
      directions: [0, 90, 180, 270]
      range: 2.0
      noise_std: 0.03

    line_sensors:
      count: 4
      positions:
        - [0.09, 0.0]
        - [-0.09, 0.0]
        - [0.0, 0.09]
        - [0.0, -0.09]

  kicker:
    force: 5.0
    cooldown: 2.0

  # Malha 3D do viewer (opcional, só cosmética — a física usa body.shape).
  # Exporte o CAD como .glb EM METROS para robots/meshes/.
  visual:
    mesh: demo.glb
    scale: 1.0
    offset: [0, 0, 0]      # metros, eixos Three.js (x=campo, y=altura, z)
    rotation: [0, 0, 0]    # graus — corrige orientação do CAD
